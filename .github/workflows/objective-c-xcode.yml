name: Xcode - Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:   # allow manual builds from the Actions tab

jobs:
  build:
    name: Build Overlook (macOS)
    runs-on: macos-latest

    permissions:
      contents: read   # read-only; this job only builds, it does not publish

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Preview Content path exists
        run: |
          set -euo pipefail
          mkdir -p "Overlook/Preview Content"

      - name: Xcode version
        run: xcodebuild -version

      - name: Cache SwiftPM + DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Resolve Swift package dependencies
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project Overlook.xcodeproj \
            -scheme Overlook

      - name: Archive (${{ matrix.configuration }})
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project Overlook.xcodeproj \
            -scheme Overlook \
            -configuration "${{ matrix.configuration }}" \
            -sdk macosx \
            -archivePath "$RUNNER_TEMP/Overlook-${{ matrix.configuration }}.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package .app as zip (${{ matrix.configuration }})
        if: matrix.configuration == 'Release'
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/Overlook-Release.xcarchive/Products/Applications/Overlook.app"
          ZIP="$RUNNER_TEMP/Overlook-Release.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Upload build artifact (${{ matrix.configuration }})
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: Overlook-Release
          path: ${{ env.ZIP }}
          retention-days: 14
